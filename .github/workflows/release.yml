name: Release

permissions: {}

on:
  push:
    tags: [ "v*" ]

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: [ci]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.6.0 # zizmor: ignore[cache-poisoning] -- cache is branch-isolated; fork PRs cannot write to this cache
      with:
        go-version-file: go.mod

    - name: Build release artifacts
      run: make dist

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        gh release create "${GITHUB_REF_NAME}"
        dist/*
        --title "Release ${GITHUB_REF_NAME}"
